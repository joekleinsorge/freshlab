argo-cd:
  global:
    domain: argocd.kleinsorge.dev
  configs:
    params:
      server.insecure: true
      controller.diff.server.side: false
    cm:
      resource.ignoreResourceUpdatesEnabled: true
      resource.customizations.ignoreResourceUpdates.all: |
        jsonPointers:
          - /status
  server:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
    ingress:
      enabled: true
      ingressClassName: cilium
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: 192.168.1.227
        hajimari.io/appName: Argo CD
        hajimari.io/icon: kubernetes
      tls: true
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    metrics: &metrics
      enabled: true
      serviceMonitor:
        enabled: true
  dex:
    enabled: false
  controller:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    metrics: *metrics
  repoServer:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    existingVolumes:
      gpgKeyring:
        persistentVolumeClaim:
          claimName: argocd-repo-server-cache
      helmWorkingDir:
        persistentVolumeClaim:
          claimName: argocd-repo-server-cache
      tmp:
        persistentVolumeClaim:
          claimName: argocd-repo-server-cache
      varFiles:
        persistentVolumeClaim:
          claimName: argocd-repo-server-cache
      plugins:
        persistentVolumeClaim:
          claimName: argocd-repo-server-cache
    metrics: *metrics
  redis:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics: *metrics
  applicationSet:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics: *metrics
  notifications:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics: *metrics
argocd-apps:
  applicationsets:
    root:
      namespace: argocd
      generators:
        - git:
            repoURL: &repoURL https://github.com/joekleinsorge/freshlab
            revision: &revision main 
            directories:
              - path: system/*
              - path: platform/*
              - path: global/*
              - path: apps/*
      template:
        metadata:
          name: '{{path.basename}}'
        spec:
          destination:
            name: in-cluster
            namespace: '{{path.basename}}'
          project: default 
          source:
            repoURL: *repoURL
            path: '{{path}}'
            targetRevision: *revision
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            retry:
              limit: 10
              backoff:
                duration: 1m
                factor: 2
                maxDuration: 16m
            syncOptions:
              - CreateNamespace=true
              - ApplyOutOfSyncOnly=true
              - ServerSideApply=true
argo-workflows:
  server:
    authModes:
      - server
      - client
    ingress:
      enabled: true
      className: cilium
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: 192.168.1.227
        hajimari.io/appName: Argo Workflows
        hajimari.io/icon: source-branch
      hosts:
        - workflows.kleinsorge.dev
      tls:
        - hosts:
            - workflows.kleinsorge.dev
          secretName: argo-workflows-tls-certificate

argocdGateway:
  enabled: true
  host: argocd.kleinsorge.dev
  serviceName: argocd-server
  servicePort: 80
  tlsSecretName: argocd-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  loadBalancerPool: ""

argoWorkflowsGateway:
  enabled: true
  host: workflows.kleinsorge.dev
  serviceName: argocd-argo-workflows-server
  servicePort: 2746
  tlsSecretName: argo-workflows-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  loadBalancerPool: ""

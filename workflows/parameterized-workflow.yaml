apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: parameterized-workflow-
spec:
  entrypoint: run
  arguments:
    parameters:
      - name: app
        value: freshlab
      - name: env
        value: dev
  templates:
    - name: run
      container:
        image: alpine:3.20
        command: [sh, -c]
        args:
          - |
            echo "Running app={{workflow.parameters.app}} in env={{workflow.parameters.env}}"
